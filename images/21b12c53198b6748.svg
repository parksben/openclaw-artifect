  <!-- 头发 -->
  <path d="M 145 95 Q 140 55 200 45 Q 260 55 255 95" fill="#3d3d3d"/>
  <path d="M 145 95 Q 140 140 155 165 L 245 165 Q 260 140 255 95" fill="#3d3d3d"/>
  
  <!-- 刘海 -->
  <path d="M 165 80 Q 175 68 200 68 Q 225 68 235 80" fill="#3d3d3d"/>
  

  <ellipse cx="140" cy="135" rx="22" ry="14" fill="rgba(255, 150, 170, 0.35)"/>
  <ellipse cx="260" cy="135" rx="22" ry="14" fill="rgba(255, 150, 170, 0.35)"/>
  
  <!-- 颈部 -->
  <rect x="190" y="175" width="20" height="25" fill="#fdbcb4"/>
  
  <!-- 颈部装饰 -->
  <path d="M 165 195 Q 200 185 235 195" stroke="#00bcd4" stroke-width="3" fill="none"/>
  
  <!-- 身体/衣服 -->
  <path d="M 160 205 L 240 205 L 255 285 L 145 285 Z" fill="#667eea" filter="url(#shadow)"/>
  
  <!-- 左臂 -->
  <ellipse cx="130" cy="240" rx="22" ry="55" fill="#fdbcb4" filter="url(#shadow)"/>
  
  <!-- 右臂 -->
  <ellipse cx="270" cy="240" rx="22" ry="55" fill="#fdbcb4" filter="url(#shadow)"/>
  
  <!-- 左手 -->
  <circle cx="110" cy="305" r="16" fill="#fdbcb4" filter="url(#shadow)"/>
  
  <!-- 右手 -->
  <circle cx="290" cy="305" r="16" fill="#fdbcb4" filter="url(#shadow)"/>
  
  <!-- 裙子 -->
  <path d="M 145 285 L 255 285 L 280 435 L 120 435 Z" fill="#667eea" filter="url(#shadow)"/>
  
  <!-- 裙子纹样 -->
  <line x1="160" y1="335" x2="240" y2="335" stroke="#00bcd4" stroke-width="1.5" opacity="0.7"/>
  <line x1="155" y1="385" x2="245" y2="385" stroke="#00bcd4" stroke-width="1.5" opacity="0.7"/>
  

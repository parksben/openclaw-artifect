  <circle cx="175" cy="118" r="13" fill="#333"/>
  <circle cx="225" cy="118" r="13" fill="#333"/>
  <circle cx="178" cy="113" r="5" fill="#fff"/>
  <circle cx="228" cy="113" r="5" fill="#fff"/>
  
  <!-- 眉毛 -->
  <path d="M 160 98 Q 175 88 190 98" stroke="#3d3d3d" stroke-width="2" fill="none"/>

<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b3e5fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="600" fill="url(#bg)"/>
  
  <!-- 头部 -->
  <circle cx="200" cy="120" r="60" fill="#fdbcb4"/>
  
  <!-- 头发 -->
  <path d="M 150 80 Q 140 50 200 40 Q 260 50 250 80" fill="#3d3d3d"/>
  <path d="M 150 80 Q 140 120 150 140 L 250 140 Q 260 120 250 80" fill="#3d3d3d"/>
  
  <!-- 刘海 -->
  <path d="M 160 75 Q 170 65 200 65 Q 230 65 240 75" fill="#3d3d3d"/>
  
  <!-- 眼睛 -->
  <circle cx="180" cy="115" r="8" fill="#333"/>
  <circle cx="220" cy="115" r="8" fill="#333"/>
  <circle cx="182" cy="112" r="3" fill="#fff"/>
  <circle cx="222" cy="112" r="3" fill="#fff"/>
  
  <!-- 鼻子 -->
  <line x1="200" y1="120" x2="200" y2="130" stroke="#fdbcb4" stroke-width="1"/>
  
  <!-- 嘴巴 -->
  <path d="M 185 140 Q 200 150 215 140" stroke="#ff6b9d" stroke-width="2" fill="none"/>
  
  <!-- 身体 -->
  <rect x="150" y="180" width="100" height="80" rx="15" fill="#667eea"/>
  
  <!-- 颈部装饰 -->
  <path d="M 170 175 Q 200 165 230 175" stroke="#00bcd4" stroke-width="3" fill="none"/>
  
  <!-- 左手臂 -->
  <ellipse cx="130" cy="210" rx="15" ry="40" fill="#fdbcb4"/>
  
  <!-- 右手臂 -->
  <ellipse cx="270" cy="210" rx="15" ry="40" fill="#fdbcb4"/>
  
  <!-- 左手 -->
  <circle cx="120" cy="260" r="12" fill="#fdbcb4"/>
  
  <!-- 右手 -->
  <circle cx="280" cy="260" r="12" fill="#fdbcb4"/>
  
  <!-- 裙子 -->
  <path d="M 150 260 L 250 260 L 270 380 L 130 380 Z" fill="#667eea"/>
  
  <!-- 裙子装饰 -->
  <line x1="155" y1="310" x2="245" y2="310" stroke="#00bcd4" stroke-width="1.5"/>
  <line x1="160" y1="345" x2="240" y2="345" stroke="#00bcd4" stroke-width="1.5"/>
  
  <!-- 腿 -->
  <rect x="175" y="380" width="12" height="60" rx="3" fill="#fdbcb4"/>
  <rect x="213" y="380" width="12" height="60" rx="3" fill="#fdbcb4"/>
  
  <!-- 鞋子 -->
  <ellipse cx="181" cy="450" rx="12" ry="8" fill="#333"/>
  <ellipse cx="219" cy="450" rx="12" ry="8" fill="#333"/>
  
  <!-- 头顶装饰波浪 -->
  <text x="200" y="35" font-size="40" text-anchor="middle">🌊</text>
  
  <!-- 名字 -->
  <text x="200" y="500" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">小小澜</text>
  
  <!-- 描述 -->
  <text x="200" y="530" font-size="14" text-anchor="middle" fill="#667eea">AI Agent × 理财顾问</text>
  <text x="200" y="550" font-size="12" text-anchor="middle" fill="#999">聪明 · 靠谱 · 有点八卦</text>
</svg>
